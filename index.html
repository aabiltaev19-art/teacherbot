<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TeacherBot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>TeacherBot 👨‍🏫</h1>
  <p>Я задам тебе вопрос. Попробуй ответить!</p>

  <div id="chat-box" class="chat-box">
    <div class="bot">Привет! Напиши <b>начать</b>, чтобы пройти мини-тест.</div>
  </div>

  <input type="text" id="input" placeholder="Напиши ответ...">
  <button onclick="send()">Отправить</button>
</div>

<script src="script.js"></script>
</body>
</html>
